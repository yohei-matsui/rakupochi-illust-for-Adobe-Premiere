<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ラクポチ イラスト</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f3f3f3;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    }

    #root {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
    }

    /* ==============================
       タブバー
    ============================== */
    #tab-bar {
      display: flex;
      align-items: flex-end;
      background: #dee1e6;
      padding: 6px 4px 0;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      gap: 1px;
      min-height: 34px;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .cep-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px 0 10px;
      height: 28px;
      min-width: 80px;
      max-width: 160px;
      background: #c9cdd4;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s;
      position: relative;
    }
    .cep-tab:hover { background: #d8dbe0; }
    .cep-tab.active {
      background: #f9f0f5;
      z-index: 1;
    }

    .cep-tab-favicon {
      width: 14px; height: 14px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .cep-tab-label {
      font-size: 11px;
      color: #4b5563;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      user-select: none;
    }
    .cep-tab.active .cep-tab-label { color: #1f2937; font-weight: 600; }

    .cep-tab-close {
      background: none;
      border: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      font-size: 11px;
      color: #9ca3af;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
      line-height: 1;
    }
    .cep-tab-close:hover { background: rgba(0,0,0,0.1); color: #374151; }

    /* 新規タブ + ボタン */
    #new-tab-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: none;
      border: none;
      font-size: 16px;
      color: #6b7280;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 2px;
      margin-bottom: 1px;
      transition: background 0.1s;
    }
    #new-tab-btn:hover { background: rgba(0,0,0,0.08); }

    /* ==============================
       ナビゲーションバー
    ============================== */
    #nav-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      background: #f9f0f5;
      border-bottom: 1px solid rgba(236,72,153,0.1);
      flex-shrink: 0;
      min-height: 38px;
    }

    /* 戻る・進む・更新ボタン */
    .nav-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #374151;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(0,0,0,0.07); }
    .nav-btn:disabled { color: #c9cdd4; cursor: default; }
    .nav-btn svg { width: 14px; height: 14px; }

    /* URLバー */
    #url-bar {
      flex: 1;
      min-width: 0;
      height: 26px;
      background: #ede8f0;
      border: 1.5px solid transparent;
      border-radius: 13px;
      padding: 0 12px;
      font-size: 11px;
      color: #1f2937;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #url-bar:focus {
      background: #fff;
      border-color: rgba(236,72,153,0.4);
    }

    /* 設定ボタン */
    #settings-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: none;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    #settings-btn:hover { background: rgba(0,0,0,0.07); }

    /* ==============================
       コンテンツエリア
    ============================== */
    #content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #iframe-container {
      position: absolute;
      inset: 0;
    }

    /* ==============================
       設定パネル
    ============================== */
    #settings-panel {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      padding: 14px;
      gap: 10px;
      overflow-y: auto;
      background: #fdf2f8;
    }
    #settings-panel.active { display: flex; }

    .settings-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; color: #9ca3af;
    }
    .settings-card {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 12px; padding: 12px;
      box-shadow: 0 2px 12px rgba(236,72,153,0.06);
    }
    .settings-card-title { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 7px; }

    #folder-display {
      width: 100%; min-height: 38px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(236,72,153,0.15);
      border-radius: 8px; padding: 7px 10px;
      font-size: 10px; color: #374151;
      word-break: break-all; line-height: 1.5; margin-bottom: 9px;
    }
    #folder-display.empty { color: #d1d5db; font-style: italic; }

    #select-folder-btn {
      width: 100%; padding: 8px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: linear-gradient(135deg, rgba(249,168,212,0.9) 0%, rgba(236,72,153,0.95) 40%, rgba(219,39,119,0.9) 100%);
      box-shadow: 0 3px 10px rgba(236,72,153,0.28);
      color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    #select-folder-btn:hover { opacity: 0.88; }

    #saved-toast {
      display: none; align-items: center; gap: 4px;
      font-size: 10px; color: #22c55e; font-weight: 600; margin-top: 5px;
    }
    #saved-toast.show { display: flex; }

    .settings-note {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 8px; padding: 9px 11px;
      font-size: 10px; color: #9ca3af; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="root">

    <!-- タブバー（上部） -->
    <div id="tab-bar">
      <!-- JS で動的生成 -->
      <button id="new-tab-btn" onclick="openNewTab()" title="新しいタブ">+</button>
    </div>

    <!-- ナビゲーションバー -->
    <div id="nav-bar">
      <button class="nav-btn" id="btn-back" onclick="navBack()" disabled title="戻る">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-fwd" onclick="navForward()" disabled title="進む">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-reload" onclick="navReload()" title="更新">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <input id="url-bar" type="text" spellcheck="false" placeholder="URL を入力..."
        onkeydown="if(event.key==='Enter') navGo(this.value)" />
      <button class="nav-btn" id="open-browser-btn" onclick="openInBrowser()" title="ブラウザで開く（ダウンロード用）">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="nav-btn" id="settings-btn" onclick="toggleSettings()" title="設定">
        ⚙️
      </button>
    </div>

    <!-- コンテンツエリア -->
    <div id="content-area">
      <div id="iframe-container"></div>

      <!-- 設定パネル -->
      <div id="settings-panel">
        <p class="settings-label">ダウンロードフォルダ設定</p>
        <div class="settings-card">
          <p class="settings-card-title">現在の保存先フォルダ</p>
          <div id="folder-display" class="empty">フォルダが設定されていません</div>
          <button id="select-folder-btn" onclick="selectFolder()">フォルダを選択</button>
          <div id="saved-toast">
            <svg width="13" height="13" fill="none" stroke="#22c55e" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            保存しました
          </div>
        </div>
        <p class="settings-note">
          ここで設定したフォルダに、ダウンロードしたイラストが保存されます。<br>
          設定は次回起動時にも引き継がれます。
        </p>
      </div>
    </div>

  </div>
  <script src="js/panel.js"></script>
</body>
</html>
